<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lab 13 - Global Energy Infrastructure</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }
        h1 { margin-bottom: 6px; }
        .subtitle { margin-top: 0; color: #555; }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 28px;
            max-width: 1100px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 16px;
        }

        .chart-title {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 700;
        }

        svg {
            width: 100%;
            height: auto;
            background: #fff;
        }
    </style>

    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
    <h1>Lab 13: Investigating Global Energy Infrastructure</h1>
    
    <div class="dashboard">
        <div class="card">
            <p class="chart-title">1: Plant Size vs Year Built (colored by energy type)</p>
            <svg id="scatter" width="1000" height="420"></svg>
        </div>

        <div class="card">
            <p class="chart-title">2: Renewable vs Non-Renewable Capacity Over Time</p>
            <svg id="lines" width="1000" height="420"></svg>
        </div>

        <div class="card">
            <p class="chart-title">3: Capacity by Decade and Energy Type (clustered bars)</p>
            <svg id="bars" width="1000" height="460"></svg>
        </div>
    </div>

    <script>
        function getEnergyTypes(data) {
            const types = [];
            data.forEach(d => {
                if (!types.includes(d.energy_type)) {
                    types.push(d.energy_type);
                }
            });
            return types;
        }

        function isRenewableType(t) {
            if (t === "Wind") return true;
            if (t === "Solar") return true;
            if (t === "Hydro") return true;
            return false;
    }

    d3.csv("power_plants.csv").then(data => {
      data.forEach(d => {
        d.capacity_mw = +d.capacity_mw;
        d.year_built = +d.year_built;
      });

      const energyTypes = getEnergyTypes(data);

      const colorScale = d3.scaleOrdinal()
        .domain(energyTypes)
        .range(d3.schemeAccent);

      // Chart 1: Scatter Plot

      {
        const svg = d3.select("#scatter");
        const svgW = +svg.attr("width");
        const svgH = +svg.attr("height");

        const margin = { top: 30, right: 20, bottom: 60, left: 70 };
        const width = svgW - margin.left - margin.right;
        const height = svgH - margin.top - margin.bottom;

        const g = svg.append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        const xScale = d3.scaleLinear()
          .domain(d3.extent(data, d => d.year_built))
          .range([0, width]);

        const yScale = d3.scaleLinear()
          .domain([0, d3.max(data, d => d.capacity_mw)])
          .range([height, 0]);

        g.append("g")
          .attr("transform", `translate(0, ${height})`)
          .call(d3.axisBottom(xScale));

        g.append("g")
          .call(d3.axisLeft(yScale));

        g.append("text")
          .attr("x", width / 2)
          .attr("y", height + 45)
          .attr("text-anchor", "middle")
          .text("Year Built");

        g.append("text")
          .attr("x", -height / 2)
          .attr("y", -50)
          .attr("transform", "rotate(-90)")
          .attr("text-anchor", "middle")
          .text("Capacity (MW)");

        g.selectAll("circle")
          .data(data)
          .join("circle")
          .attr("cx", d => xScale(d.year_built))
          .attr("cy", d => yScale(d.capacity_mw))
          .attr("r", 5)
          .style("fill", d => colorScale(d.energy_type))
          .style("opacity", 0.85);
      }

      // Chart 2: Line Chart

      {
        data.forEach(d => {
          d.type_group = isRenewableType(d.energy_type) ? "Renewable" : "Non-Renewable";
          d.year_date = new Date(d.year_built, 0, 1);
        });

        const result = d3.rollup(
          data,
          v => d3.sum(v, d => d.capacity_mw),
          d => d.type_group,
          d => d.year_date
        );

        const lineData = Array.from(result, ([groupName, yearMap]) => {
          const values = Array.from(yearMap, ([date, total]) => ({
            date: date,
            total: total
          }));

          values.sort((a, b) => a.date - b.date);

          return {
            group: groupName,
            values: values
          };
        });

        let maxTotal = 0;
        lineData.forEach(series => {
          series.values.forEach(pt => {
            if (pt.total > maxTotal) maxTotal = pt.total;
          });
        });

        const svg = d3.select("#lines");
        const svgW = +svg.attr("width");
        const svgH = +svg.attr("height");

        const margin = { top: 30, right: 20, bottom: 60, left: 70 };
        const width = svgW - margin.left - margin.right;
        const height = svgH - margin.top - margin.bottom;

        const g = svg.append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        const xScale = d3.scaleTime()
          .domain(d3.extent(data, d => d.year_date))
          .range([0, width]);

        const yScale = d3.scaleLinear()
          .domain([0, maxTotal])
          .range([height, 0]);

        g.append("g")
          .attr("transform", `translate(0, ${height})`)
          .call(d3.axisBottom(xScale));

        g.append("g")
          .call(d3.axisLeft(yScale));

        g.append("text")
          .attr("x", width / 2)
          .attr("y", height + 45)
          .attr("text-anchor", "middle")
          .text("Year Built");

        g.append("text")
          .attr("x", -height / 2)
          .attr("y", -50)
          .attr("transform", "rotate(-90)")
          .attr("text-anchor", "middle")
          .text("Total Capacity (MW)");

        const line = d3.line()
          .x(d => xScale(d.date))
          .y(d => yScale(d.total));

        const groupColor = d3.scaleOrdinal()
          .domain(["Renewable", "Non-Renewable"])
          .range(d3.schemeAccent);

        g.selectAll(".line")
          .data(lineData)
          .join("path")
          .attr("class", "line")
          .attr("fill", "none")
          .attr("stroke", d => groupColor(d.group))
          .attr("stroke-width", 2)
          .attr("d", d => line(d.values));
      }

      // Chart 3: Clustered Bar Chart

      {
        data.forEach(d => {
          d.decade = Math.floor(d.year_built / 10) * 10;
        });

        const barResult = d3.rollup(
          data,
          v => d3.sum(v, d => d.capacity_mw),
          d => d.decade,
          d => d.energy_type
        );

        const barData = Array.from(barResult, ([decade, typeMap]) => {
          return {
            decade: decade,
            values: Array.from(typeMap, ([type, total]) => ({
              type: type,
              total: total
            }))
          };
        });

        barData.sort((a, b) => a.decade - b.decade);

        let maxBar = 0;
        barData.forEach(d => {
          d.values.forEach(v => {
            if (v.total > maxBar) maxBar = v.total;
          });
        });

        const svg = d3.select("#bars");
        const svgW = +svg.attr("width");
        const svgH = +svg.attr("height");

        const margin = { top: 30, right: 20, bottom: 80, left: 70 };
        const width = svgW - margin.left - margin.right;
        const height = svgH - margin.top - margin.bottom;

        const g = svg.append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        const decades = [];
        barData.forEach(d => decades.push(d.decade));

        const x0 = d3.scaleBand()
          .domain(decades)
          .range([0, width])
          .padding(0.2);

        const x1 = d3.scaleBand()
          .domain(energyTypes)
          .range([0, x0.bandwidth()])
          .padding(0.05);

        const y = d3.scaleLinear()
          .domain([0, maxBar])
          .range([height, 0]);

        g.append("g")
          .attr("transform", `translate(0, ${height})`)
          .call(d3.axisBottom(x0));

        g.append("g")
          .call(d3.axisLeft(y));

        g.append("text")
          .attr("x", width / 2)
          .attr("y", height + 55)
          .attr("text-anchor", "middle")
          .text("Decade");

        g.append("text")
          .attr("x", -height / 2)
          .attr("y", -50)
          .attr("transform", "rotate(-90)")
          .attr("text-anchor", "middle")
          .text("Total Capacity (MW)");


        g.selectAll("g.decade-group")
          .data(barData)
          .join("g")
          .attr("class", "decade-group")
          .attr("transform", d => `translate(${x0(d.decade)},0)`)
          .selectAll("rect")
          .data(d => d.values)
          .join("rect")
          .attr("x", d => x1(d.type))
          .attr("y", d => y(d.total))
          .attr("width", x1.bandwidth())
          .attr("height", d => height - y(d.total))
          .attr("fill", d => colorScale(d.type))
          .style("opacity", 0.9);
      }

    });
    </script>
</body>
</html>
